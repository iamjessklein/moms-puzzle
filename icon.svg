<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9589D8"/>
      <stop offset="100%" style="stop-color:#3d3480"/>
    </linearGradient>
    <filter id="tint" color-interpolation-filters="sRGB">
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.55" intercept="0.18"/>
        <feFuncG type="linear" slope="0.44" intercept="0.28"/>
        <feFuncB type="linear" slope="0.85" intercept="0.0"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Heart puzzle image from Noun Project, tinted white -->
  <image href="https://static.thenounproject.com/png/heart-puzzle-icon-7589425-512.png"
    x="96" y="96" width="320" height="320"
    style="filter: brightness(0) invert(1);"/>
</svg>
